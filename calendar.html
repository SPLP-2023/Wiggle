<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="manifest" href="/Wiggle/manifest.json">
  <meta name="theme-color" content="#f59e0b">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="SP FSM">
  <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/SPLP-2023/tool/refs/heads/main/icons/icon-192x192.png">
  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Calendar — Strike Point</title>
<style>
  :root {
    --primary:#f59e0b; --primary-dark:#d97706; --primary-light:#fef3c7;
    --dark:#0f172a; --dark2:#1e293b; --dark3:#334155;
    --text:#f1f5f9; --text-muted:#94a3b8;
    --card-bg:#1e293b; --border:#334155;
    --success:#22c55e; --warning:#f59e0b; --danger:#ef4444;
    --info:#3b82f6; --pending:#a855f7;
    --radius:10px; --shadow:0 4px 24px rgba(0,0,0,0.4);
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:'Segoe UI',system-ui,sans-serif; background:var(--dark); color:var(--text); min-height:100vh; }

  /* NAV */
  nav { background:var(--dark2); border-bottom:1px solid var(--border); padding:0 20px; height:60px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100; }
  .nav-brand { display:flex; align-items:center; gap:9px; cursor:pointer; }
  .nav-brand span { font-weight:700; font-size:15px; color:var(--primary); }
  .nav-right { display:flex; align-items:center; gap:10px; }
  .user-badge { display:flex; align-items:center; gap:8px; background:var(--dark3); border-radius:8px; padding:5px 11px; font-size:13px; }
  .user-avatar { width:28px; height:28px; border-radius:50%; background:var(--primary); display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:700; color:var(--dark); }

  /* BUTTONS */
  .btn { display:inline-flex; align-items:center; justify-content:center; gap:7px; padding:10px 20px; border-radius:var(--radius); font-size:13px; font-weight:600; cursor:pointer; border:none; transition:all 0.2s; white-space:nowrap; }
  .btn-primary { background:var(--primary); color:var(--dark); }
  .btn-primary:hover { background:var(--primary-dark); }
  .btn-secondary { background:var(--dark3); color:var(--text); }
  .btn-secondary:hover { background:#475569; }
  .btn-sm { padding:7px 14px; font-size:12px; }

  /* MAIN */
  main { width:100%; padding:24px 16px 60px; }

  /* CALENDAR HEADER */
  .cal-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; flex-wrap:wrap; gap:12px; }
  .cal-header h2 { font-size:22px; font-weight:700; }
  .cal-nav { display:flex; align-items:center; gap:12px; }
  .cal-nav-btn { background:var(--dark3); border:1px solid var(--border); color:var(--text); width:36px; height:36px; border-radius:8px; font-size:18px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all 0.2s; }
  .cal-nav-btn:hover { border-color:var(--primary); color:var(--primary); }
  .cal-month-label { font-size:18px; font-weight:700; min-width:180px; text-align:center; }
  .cal-today-btn { padding:7px 14px; background:var(--dark3); border:1px solid var(--border); color:var(--text-muted); border-radius:8px; font-size:12px; font-weight:600; cursor:pointer; transition:all 0.2s; }
  .cal-today-btn:hover { border-color:var(--primary); color:var(--primary); }

  /* LEGEND */
  .cal-legend { display:flex; flex-wrap:wrap; gap:16px; margin-bottom:12px; align-items:center; }
  .legend-section { display:flex; flex-wrap:wrap; gap:10px; align-items:center; }
  .legend-divider { width:1px; height:16px; background:var(--border); }
  .legend-item { display:flex; align-items:center; gap:6px; font-size:12px; color:var(--text-muted); }
  .legend-dot { width:9px; height:9px; border-radius:50%; flex-shrink:0; }
  .legend-pill { width:28px; height:14px; border-radius:4px; border:2px solid; flex-shrink:0; }

  /* SCROLL HINT */
  .cal-scroll-hint { display:none; text-align:center; font-size:11px; color:var(--text-muted); padding:0 0 8px; letter-spacing:0.3px; }

  /* SCROLL WRAPPER */
  .cal-scroll-wrap { width:100%; overflow-x:auto; -webkit-overflow-scrolling:touch; border-radius:14px; }

  /* CALENDAR GRID */
  .cal-grid { background:var(--card-bg); border:1px solid var(--border); border-radius:14px; overflow:hidden; min-width:560px; }
  .cal-days-header { display:grid; grid-template-columns:repeat(7,1fr); border-bottom:1px solid var(--border); background:var(--card-bg); }
  .cal-day-name { padding:12px 8px; text-align:center; font-size:12px; font-weight:700; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.5px; }
  .cal-cells { display:grid; grid-template-columns:repeat(7,1fr); }

  .cal-cell {
    height:128px;
    border-right:1px solid var(--border);
    border-bottom:1px solid var(--border);
    padding:6px 5px 4px;
    position:relative;
    transition:background 0.15s;
    overflow:hidden;
  }
  .cal-cell:nth-child(7n) { border-right:none; }
  .cal-cell.other-month { opacity:0.35; }
  .cal-cell.today { background:rgba(245,158,11,0.07); }
  .cal-cell.today .cal-date-num { background:var(--primary); color:var(--dark); border-radius:50%; width:22px; height:22px; display:flex; align-items:center; justify-content:center; }
  .cal-date-num { font-size:12px; font-weight:600; color:var(--text-muted); margin-bottom:4px; width:22px; height:22px; display:flex; align-items:center; justify-content:center; }

  /* ── ADD JOB HOVER BUTTON ── */
  .cal-cell:not(.other-month) { cursor:pointer; }
  .cal-add-btn {
    position:absolute; bottom:5px; right:5px;
    width:20px; height:20px; border-radius:50%;
    background:var(--primary); color:#000;
    font-size:14px; font-weight:700; line-height:20px; text-align:center;
    opacity:0; transition:opacity 0.15s;
    pointer-events:auto;
  }
  .cal-cell:not(.other-month):hover .cal-add-btn { opacity:0.7; }
  .cal-cell:not(.other-month):hover { background:rgba(245,158,11,0.04); }

  /* ── ENGINEER-COLOURED PILLS ── */
  .cal-job-pill {
    display:flex; align-items:center; gap:4px;
    padding:2px 5px; border-radius:5px; font-size:11px; font-weight:600;
    cursor:pointer; margin-bottom:2px; transition:opacity 0.15s;
    overflow:hidden; white-space:nowrap; max-width:100%;
    border-width:1.5px; border-style:solid;
  }
  .cal-job-pill:hover { opacity:0.75; }
  .cal-job-pill .pill-text { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; min-width:0; flex:1; }

  /* Status dot inside pill */
  .pill-status-dot {
    width:7px; height:7px; border-radius:50%; flex-shrink:0;
  }
  .dot-live         { background:#f59e0b; box-shadow:0 0 4px #f59e0b; }
  .dot-pending      { background:#a855f7; box-shadow:0 0 4px #a855f7; }
  .dot-complete     { background:#22c55e; box-shadow:0 0 4px #22c55e; }
  .dot-aborted      { background:#ef4444; box-shadow:0 0 4px #ef4444; }
  .dot-notconfirmed { background:#ef4444; box-shadow:0 0 4px #ef4444; }

  /* +X MORE button */
  .cal-more-btn { display:inline-flex; align-items:center; font-size:10px; font-weight:700; color:var(--primary); background:rgba(245,158,11,0.08); border:1px solid rgba(245,158,11,0.25); border-radius:5px; padding:2px 7px; cursor:pointer; transition:background 0.15s; margin-top:1px; }
  .cal-more-btn:hover { background:rgba(245,158,11,0.18); }

  /* MODALS */
  .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:200; display:flex; align-items:center; justify-content:center; padding:16px; }
  .modal { background:var(--card-bg); border:1px solid var(--border); border-radius:16px; width:100%; max-width:460px; max-height:90vh; overflow-y:auto; box-shadow:var(--shadow); }
  .modal-header { padding:18px 22px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; background:var(--card-bg); z-index:1; }
  .modal-header h3 { font-size:16px; font-weight:700; }
  .modal-close { background:var(--dark3); border:none; color:var(--text); width:30px; height:30px; border-radius:50%; font-size:16px; cursor:pointer; display:flex; align-items:center; justify-content:center; }
  .modal-body { padding:22px; }

  /* DATE MODAL JOB LIST */
  .date-job-item { display:flex; align-items:center; justify-content:space-between; padding:12px; background:var(--dark); border:1px solid var(--border); border-radius:10px; margin-bottom:10px; cursor:pointer; transition:border-color 0.2s; gap:12px; }
  .date-job-item:hover { border-color:var(--primary); }
  .date-job-ref { font-size:16px; font-weight:700; color:var(--primary); }
  .date-job-company { font-size:14px; font-weight:600; margin-top:2px; }
  .date-job-type { font-size:12px; color:var(--text-muted); margin-top:2px; }
  .date-job-engineers { font-size:11px; color:var(--text-muted); margin-top:4px; }

  /* JOB POPUP */
  .popup-section { margin-bottom:16px; }
  .popup-section label { font-size:11px; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.4px; display:block; margin-bottom:4px; }
  .popup-section .val { font-size:14px; font-weight:500; }
  .popup-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:16px; }
  .status-pill { display:inline-flex; align-items:center; gap:7px; background:var(--dark3); border-radius:20px; padding:5px 12px; }
  .status-dot { width:9px; height:9px; border-radius:50%; }
  .status-live         { background:var(--warning); box-shadow:0 0 5px var(--warning); }
  .status-pending      { background:var(--pending); box-shadow:0 0 5px var(--pending); }
  .status-complete     { background:var(--success); box-shadow:0 0 5px var(--success); }
  .status-aborted      { background:var(--danger);  box-shadow:0 0 5px var(--danger); }
  .status-notconfirmed { background:var(--danger);  box-shadow:0 0 5px var(--danger); }
  .status-label { font-size:12px; font-weight:600; }
  .badge-overdue { font-size:11px; padding:3px 9px; border-radius:20px; background:var(--danger); color:#fff; font-weight:700; }
  .hidden { display:none !important; }

  /* CALENDAR GRID — needs to be a positioning context for the span overlay */
  .cal-cells { position:relative; }

  /* ENGINEER FILTER BUTTONS */
  .eng-filter-btn {
    display:inline-flex; align-items:center; gap:6px;
    padding:4px 12px; border-radius:20px; font-size:12px; font-weight:600;
    cursor:pointer; border:1.5px solid; transition:all 0.2s;
    font-family:inherit;
  }
  .eng-filter-btn:hover { opacity:0.8; }
  .eng-filter-btn.eng-inactive {
    border-color:var(--border) !important;
    background:transparent !important;
    color:var(--text-muted) !important;
    opacity:0.45;
  }

  /* FILTER TOGGLES */
  .cal-filters { display:flex; align-items:center; gap:8px; margin-bottom:12px; flex-wrap:wrap; }
  .filter-toggle {
    display:inline-flex; align-items:center; gap:6px;
    padding:6px 16px; border-radius:20px; font-size:12px; font-weight:600;
    cursor:pointer; border:1.5px solid; transition:all 0.2s; background:transparent;
  }
  .filter-toggle.active-jobs   { background:rgba(245,158,11,0.15); border-color:var(--primary); color:var(--primary); }
  .filter-toggle.inactive-jobs { border-color:var(--border); color:var(--text-muted); }
  .filter-toggle.active-leave  { background:rgba(6,182,212,0.15); border-color:#06b6d4; color:#06b6d4; }
  .filter-toggle.inactive-leave{ border-color:var(--border); color:var(--text-muted); }

  /* SPANNING BARS (rendered in overlay layer) */
  .cal-span-bar { transition:opacity 0.15s; }
  .cal-span-bar:hover { opacity:0.75; }

  /* LEAVE MODAL FORM HELPERS */
  .leave-form-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  .leave-form-group { margin-bottom:14px; }
  .leave-form-group label { display:block; font-size:12px; color:var(--text-muted); margin-bottom:6px; font-weight:500; }
  .leave-form-group input,
  .leave-form-group select,
  .leave-form-group textarea {
    width:100%; padding:10px 13px; background:var(--dark); border:1px solid var(--border);
    border-radius:var(--radius); color:var(--text); font-size:13px; font-family:inherit;
    transition:border-color 0.2s;
  }
  .leave-form-group input:focus,
  .leave-form-group select:focus,
  .leave-form-group textarea:focus { outline:none; border-color:#06b6d4; }
  .leave-form-group select option { background:var(--dark2); }
  .leave-form-group input:disabled,
  .leave-form-group select:disabled { opacity:0.6; cursor:not-allowed; }

  /* MOBILE PORTRAIT */
  @media(max-width:640px) {
    main { padding:10px 8px 40px; }
    .cal-header h2 { font-size:17px; }
    .cal-month-label { font-size:14px; min-width:130px; }
    .cal-nav-btn { width:30px; height:30px; font-size:15px; }
    .cal-day-name { padding:8px 4px; font-size:10px; }
    .cal-job-pill { font-size:10px; padding:2px 4px; }
    .cal-more-btn { font-size:9px; padding:1px 5px; }
    .cal-date-num { font-size:11px; }
    .cal-scroll-hint { display:block; }
  }

  /* MOBILE LANDSCAPE */
  @media(max-height:500px) and (orientation:landscape) {
    main { padding:6px 8px 10px; }
    nav { height:44px; }
    .cal-header { margin-bottom:8px; }
    .cal-header h2 { font-size:15px; }
    .cal-legend { display:none; }
    .cal-date-num { font-size:10px; width:16px; height:16px; }
    .cal-day-name { padding:5px 3px; font-size:9px; }
    .cal-month-label { font-size:13px; min-width:100px; }
    .cal-nav-btn { width:28px; height:28px; font-size:15px; }
    .cal-today-btn { padding:4px 10px; font-size:11px; }
    .cal-job-pill { font-size:9px; padding:1px 4px; }
    .btn-sm { padding:5px 10px; font-size:11px; }
    .user-badge { padding:3px 8px; font-size:12px; }
    .cal-scroll-hint { display:block; }
  }
</style>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
</head>
<body>

<nav>
  <div class="nav-brand" onclick="goBack()">
    <img src="https://raw.githubusercontent.com/SPLP-2023/tool/refs/heads/main/assets/Color%20logo%20-%20no%20background%20(px%20reduction).png" alt="Logo" style="height:32px;width:auto;object-fit:contain;">
    <span>Strike Point</span>
  </div>
  <div class="nav-right">
    <button class="btn btn-secondary btn-sm" id="btn-back" onclick="goBack()" style="display:none;">&#8592; Back</button>
    <button class="btn btn-secondary btn-sm" onclick="window.location.href='/Wiggle/index.html?from=calendar'">&#127968; Dashboard</button>
    <button class="btn btn-secondary btn-sm" onclick="window.location.href='/Wiggle/customers.html?from=calendar'">&#128101; Customers</button>
    <button class="btn btn-secondary btn-sm" onclick="window.location.href='/Wiggle/crm-quotes.html?from=calendar'">&#128176; Quotes</button>
    <button class="btn btn-secondary btn-sm" onclick="window.location.href='/Wiggle/crm-invoices.html?from=calendar'">&#129534; Invoices</button>
    <button class="btn btn-secondary btn-sm" onclick="window.location.href='/Wiggle/job-search.html?from=calendar'">&#128269; Search</button>
    <button class="btn btn-secondary btn-sm" onclick="window.location.href='/Wiggle/settings.html?from=calendar'">&#9881;&#65039; Settings</button>
    <div class="user-badge">
      <div class="user-avatar" id="user-avatar">?</div>
      <span id="user-name-display">&#8212;</span>
    </div>
  </div>
</nav>

<main>
  <div class="cal-header">
    <h2>&#128197; Calendar</h2>
    <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
      <button class="btn btn-sm" style="background:rgba(6,182,212,0.15);border:1.5px solid #06b6d4;color:#06b6d4;font-weight:600;" onclick="openAddLeaveModal()">&#9992;&#65039; Add Leave</button>
      <div class="cal-nav">
        <button class="cal-nav-btn" onclick="changeMonth(-1)">&#8249;</button>
        <div class="cal-month-label" id="cal-month-label">&#8212;</div>
        <button class="cal-nav-btn" onclick="changeMonth(1)">&#8250;</button>
        <button class="cal-today-btn" onclick="goToToday()">Today</button>
      </div>
    </div>
  </div>

  <!-- FILTER TOGGLES -->
  <div class="cal-filters">
    <span style="font-size:11px;color:var(--text-muted);font-weight:600;text-transform:uppercase;letter-spacing:0.5px;">Show:</span>
    <button id="filter-jobs"  class="filter-toggle active-jobs"   onclick="toggleFilter('jobs')">&#128188; Jobs</button>
    <button id="filter-leave" class="filter-toggle active-leave" onclick="toggleFilter('leave')">&#9992;&#65039; Leave</button>
  </div>

  <!-- LEGEND -->
  <div class="cal-legend">
    <div class="legend-section" id="eng-filter-section">
      <span style="font-size:11px;color:var(--text-muted);font-weight:600;text-transform:uppercase;letter-spacing:0.5px;">Engineers</span>
      <!-- populated by buildEngineerFilters() after Firebase loads -->
    </div>
    <div class="legend-divider"></div>
    <div class="legend-section">
      <span style="font-size:11px;color:var(--text-muted);font-weight:600;text-transform:uppercase;letter-spacing:0.5px;">Leave</span>
      <div class="legend-item"><div class="legend-pill" style="background:rgba(6,182,212,0.15);border-color:#06b6d4;"></div> Approved</div>
      <div class="legend-item"><div class="legend-pill" style="background:rgba(245,158,11,0.15);border-color:#f59e0b;border-style:dashed;"></div> Pending</div>
    </div>
    <div class="legend-divider"></div>
    <div class="legend-section">
      <span style="font-size:11px;color:var(--text-muted);font-weight:600;text-transform:uppercase;letter-spacing:0.5px;">Status dot</span>
      <div class="legend-item"><div class="legend-dot" style="background:#f59e0b;box-shadow:0 0 4px #f59e0b;"></div> Live</div>
      <div class="legend-item"><div class="legend-dot" style="background:#a855f7;box-shadow:0 0 4px #a855f7;"></div> Pending</div>
      <div class="legend-item"><div class="legend-dot" style="background:#22c55e;box-shadow:0 0 4px #22c55e;"></div> Complete</div>
      <div class="legend-item"><div class="legend-dot" style="background:#ef4444;box-shadow:0 0 4px #ef4444;"></div> Aborted / Not Confirmed</div>
    </div>
  </div>

  <div class="cal-scroll-hint">&#8592; swipe to scroll all 7 days &#8594;</div>

  <div class="cal-scroll-wrap">
    <div class="cal-grid">
      <div class="cal-days-header">
        <div class="cal-day-name">Mon</div>
        <div class="cal-day-name">Tue</div>
        <div class="cal-day-name">Wed</div>
        <div class="cal-day-name">Thu</div>
        <div class="cal-day-name">Fri</div>
        <div class="cal-day-name">Sat</div>
        <div class="cal-day-name">Sun</div>
      </div>
      <div class="cal-cells" id="cal-cells"></div>
    </div>
  </div>
</main>

<!-- DATE JOBS LIST MODAL -->
<div class="modal-overlay hidden" id="modal-date-jobs">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modal-date-title">Jobs on this date</h3>
      <button class="modal-close" onclick="closeModal('modal-date-jobs')">&#10005;</button>
    </div>
    <div class="modal-body" id="modal-date-body"></div>
  </div>
</div>

<!-- JOB DETAIL POPUP MODAL -->
<div class="modal-overlay hidden" id="modal-job-popup">
  <div class="modal">
    <div class="modal-header">
      <div style="display:flex;align-items:center;gap:10px;">
        <h3 id="popup-ref">&#8212;</h3>
        <span id="popup-type" style="font-size:12px;padding:3px 10px;border-radius:20px;background:var(--dark3);color:var(--text-muted);font-weight:600;">&#8212;</span>
      </div>
      <button class="modal-close" onclick="closeModal('modal-job-popup')">&#10005;</button>
    </div>
    <div class="modal-body">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap;">
        <div class="status-pill">
          <div class="status-dot" id="popup-status-dot"></div>
          <span class="status-label" id="popup-status-label">&#8212;</span>
        </div>
        <span class="badge-overdue hidden" id="popup-overdue">&#9888; Overdue</span>
      </div>
      <div class="popup-grid">
        <div class="popup-section">
          <label>Company</label>
          <div class="val" id="popup-company">&#8212;</div>
        </div>
        <div class="popup-section">
          <label>Booking Date</label>
          <div class="val" id="popup-date">&#8212;</div>
        </div>
        <div class="popup-section">
          <label>Job Time</label>
          <div class="val" id="popup-time" style="color:var(--primary);font-weight:600;">&#8212;</div>
        </div>
        <div class="popup-section">
          <label>Postcode</label>
          <div class="val" id="popup-postcode">&#8212;</div>
        </div>
        <div class="popup-section">
          <label>Site Rep</label>
          <div class="val" id="popup-rep">&#8212;</div>
        </div>
      </div>
      <div class="popup-section">

<script>
let currentUser;
let currentYear, currentMonth;
let selectedJobId  = null;

// Local fallbacks in case data.js is cached from before the leave update
function genLeaveId() {
  return 'l_' + Date.now() + '_' + Math.random().toString(36).slice(2, 7);
}
function _saveLeave(leaveItem) {
  if (!_db) return Promise.resolve();
  const { id, ...data } = leaveItem;
  return _db.collection('leave').doc(id).set(data);
}
function _loadLeaveIfNeeded() {
  if (!_db || (appData.leave && appData.leave.length !== undefined && appData.leave._loaded)) return Promise.resolve();
  return _db.collection('leave').orderBy('createdAt', 'desc').get()
    .then(snap => { appData.leave = snap.docs.map(d => ({ ...d.data(), id: d.id })); })
    .catch(() => { if (!appData.leave) appData.leave = []; });
}
let selectedLeaveId = null;
let showJobs  = true;
let showLeave = true;
let hiddenEngineers = new Set(); // empty = all engineers visible

// Engineer colour map — built after Firebase loads
let engineerColourMap = {}; // id -> colour

const JOINT_COLOUR  = '#949494';
const LEAVE_COLOUR  = '#06b6d4';
const LEAVE_PENDING = '#f59e0b';

// ── DATE RANGE HELPER ─────────────────────────
function getDateRange(startStr, endStr) {
  const dates = [];
  const cur = new Date(startStr + 'T00:00:00');
  const end = new Date(endStr   + 'T00:00:00');
  while (cur <= end) {
    // Use local date parts to avoid UTC offset shifting the date (e.g. BST = UTC+1)
    const y = cur.getFullYear();
    const m = String(cur.getMonth() + 1).padStart(2, '0');
    const d = String(cur.getDate()).padStart(2, '0');
    dates.push(`${y}-${m}-${d}`);
    cur.setDate(cur.getDate() + 1);
  }
  return dates;
}

// ── ENGINEER FILTER BUTTONS ───────────────────
function buildEngineerFilters() {
  const section = document.getElementById('eng-filter-section');
  if (!section) return;
  const engineers = appData.users.filter(u => u.colour);
  if (!engineers.length) return;

  // Clear placeholder content, keep the label
  section.innerHTML = '<span style="font-size:11px;color:var(--text-muted);font-weight:600;text-transform:uppercase;letter-spacing:0.5px;">Engineers</span>';

  engineers.forEach(u => {
    const r = parseInt(u.colour.slice(1,3),16);
    const g = parseInt(u.colour.slice(3,5),16);
    const b = parseInt(u.colour.slice(5,7),16);
    const btn = document.createElement('button');
    btn.id        = 'eng-btn-' + u.id;
    btn.className = 'eng-filter-btn';
    btn.style.cssText = `background:rgba(${r},${g},${b},0.15);border-color:${u.colour};color:${u.colour};`;
    btn.innerHTML = u.name.split(' ')[0]; // first name only
    btn.onclick   = () => toggleEngineerFilter(u.id, u.colour, r, g, b);
    section.appendChild(btn);
  });

  // Static Joint indicator (not a filter — just a legend swatch)
  const joint = document.createElement('span');
  joint.className = 'legend-item';
  joint.innerHTML = '<div class="legend-pill" style="background:rgba(148,148,148,0.15);border-color:#949494;display:inline-block;"></div> Joint';
  section.appendChild(joint);
}

function toggleEngineerFilter(id, colour, r, g, b) {
  const btn = document.getElementById('eng-btn-' + id);
  if (hiddenEngineers.has(id)) {
    hiddenEngineers.delete(id);
    if (btn) {
      btn.classList.remove('eng-inactive');
      btn.style.cssText = `background:rgba(${r},${g},${b},0.15);border-color:${colour};color:${colour};`;
    }
  } else {
    hiddenEngineers.add(id);
    if (btn) btn.classList.add('eng-inactive');
  }
  renderCalendar();
}

// ── FILTER TOGGLES ────────────────────────────
function toggleFilter(type) {
  if (type === 'jobs')  showJobs  = !showJobs;
  if (type === 'leave') showLeave = !showLeave;
  updateFilterUI();
  renderCalendar();
}

function updateFilterUI() {
  const jBtn = document.getElementById('filter-jobs');
  const lBtn = document.getElementById('filter-leave');
  if (jBtn) jBtn.className = 'filter-toggle ' + (showJobs  ? 'active-jobs'   : 'inactive-jobs');
  if (lBtn) lBtn.className = 'filter-toggle ' + (showLeave ? 'active-leave'  : 'inactive-leave');
}

document.addEventListener('DOMContentLoaded', () => {
  currentUser = requireAuth();
  if (!currentUser) return;
  showLoader();
  setLoaderMsg('Loading calendar\u2026');
  initFirebaseWithAuth().then(() => {
    hideLoader();
    document.getElementById('user-avatar').textContent       = currentUser.name[0].toUpperCase();
    document.getElementById('user-name-display').textContent = currentUser.name;
    updateBackButton();

    // Build engineer colour map from loaded users
    appData.users.forEach(u => {
      if (u.colour) engineerColourMap[u.id] = u.colour;
    });
    buildEngineerFilters();

    const now    = new Date();
    currentYear  = now.getFullYear();
    currentMonth = now.getMonth();

    // Load leave fresh from Firestore every time \u2014 self-contained so
    // it works even if data.js is a cached version without leave support.
    _db.collection('leave').orderBy('createdAt', 'desc').get()
      .then(snap => {
        appData.leave = snap.docs.map(d => ({ ...d.data(), id: d.id }));
      })
      .catch(() => { appData.leave = []; })
      .then(() => renderCalendar());
  }).catch(err => {
    hideLoader();
    console.error('Firebase error', err);
    showToast('Connection error \u2014 please refresh.', 'error');
  });
});

function goBack() {
  const params = new URLSearchParams(window.location.search);
  const from   = params.get('from');
  if (from === 'customers')      window.location.href = '/Wiggle/customers.html';
  else if (from === 'quotes')    window.location.href = '/Wiggle/crm-quotes.html';
  else if (from === 'invoices')  window.location.href = '/Wiggle/crm-invoices.html';
  else if (from === 'settings')  window.location.href = '/Wiggle/settings.html';
  else if (from === 'search')    window.location.href = '/Wiggle/job-search.html';
  else                           window.location.href = '/Wiggle/index.html';
}

function updateBackButton() {
  const params = new URLSearchParams(window.location.search);
  const from   = params.get('from');
  const btn    = document.getElementById('btn-back');
  if (!btn || !from) return;
  const labels = {
    dashboard: '← Dashboard', customers: '← Customers',
    quotes: '← Quotes', invoices: '← Invoices',
    settings: '← Settings', search: '← Search'
  };
  if (labels[from]) { btn.textContent = labels[from]; btn.style.display = 'inline-flex'; }
}

// ── PILL COLOUR LOGIC ─────────────────────────
// Returns { bg, border, text } based on engineer(s)
function getPillColour(engineers) {
  const assigned = (engineers || []).filter(id => engineerColourMap[id]);
  if (assigned.length === 0) {
    // Unassigned — neutral grey
    return { colour: '#94a3b8' };
  }
  if (assigned.length > 1) {
    // Joint job
    return { colour: JOINT_COLOUR };
  }
  // Single engineer
  return { colour: engineerColourMap[assigned[0]] };
}

function pillStyle(colour) {
  // Convert hex to rgba for background tint
  const r = parseInt(colour.slice(1,3),16);
  const g = parseInt(colour.slice(3,5),16);
  const b = parseInt(colour.slice(5,7),16);
  return `background:rgba(${r},${g},${b},0.15);border-color:${colour};color:${colour};`;
}

function dotClass(status) {
  const map = {
    live:         'dot-live',
    pending:      'dot-pending',
    complete:     'dot-complete',
    aborted:      'dot-aborted',
    notconfirmed: 'dot-notconfirmed',
  };
  return map[status] || 'dot-live';
}

// ── VISIBLE JOBS ──────────────────────────────
function getVisibleJobs() {
  let jobs = currentUser.role === 'manager'
    ? appData.jobs
    : appData.jobs.filter(j => j.engineers && j.engineers.includes(currentUser.id));

  if (hiddenEngineers.size > 0) {
    jobs = jobs.filter(j => {
      if (!j.engineers || !j.engineers.length) return true; // unassigned always shows
      return j.engineers.some(id => !hiddenEngineers.has(id));
    });
  }
  return jobs;
}

// ── RENDER CALENDAR ───────────────────────────
function renderCalendar() {
  const months = ['January','February','March','April','May','June',
                  'July','August','September','October','November','December'];
  document.getElementById('cal-month-label').textContent = months[currentMonth] + ' ' + currentYear;

  const cells    = document.getElementById('cal-cells');
  const today    = new Date();
  // Only use jobs if the jobs filter is on
  const jobs     = showJobs ? getVisibleJobs() : [];
  const MAX_SHOW = 3;

  // dateStr -> jobs[] — multi-day jobs (endDate > bookingDate) appear in the
  // spanning overlay only, not as inline pills, so we exclude them here.
  const jobMap = {};
  jobs.forEach(j => {
    if (!j.bookingDate) return;
    if (j.endDate && j.endDate > j.bookingDate) return; // handled by overlay
    if (!jobMap[j.bookingDate]) jobMap[j.bookingDate] = [];
    jobMap[j.bookingDate].push(j);
  });
  // Sort each day's jobs: timed jobs first (ascending), untimed jobs at end
  Object.keys(jobMap).forEach(d => {
    jobMap[d].sort((a, b) => {
      if (a.jobTime && b.jobTime) return a.jobTime.localeCompare(b.jobTime);
      if (a.jobTime) return -1;
      if (b.jobTime) return 1;
      return 0;
    });
  });

  // First day — Mon = 0
  const firstDay = new Date(currentYear, currentMonth, 1);
  let startDow = firstDay.getDay();
  startDow = startDow === 0 ? 6 : startDow - 1;

  const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
  const daysInPrev  = new Date(currentYear, currentMonth,     0).getDate();
  const totalCells  = Math.ceil((startDow + daysInMonth) / 7) * 7;

  let html = '';
  for (let i = 0; i < totalCells; i++) {
    let day, month, year, isOther = false;

    if (i < startDow) {
      day = daysInPrev - startDow + i + 1;
      month = currentMonth - 1; year = currentYear;
      if (month < 0) { month = 11; year--; }
      isOther = true;
    } else if (i >= startDow + daysInMonth) {
      day = i - startDow - daysInMonth + 1;
      month = currentMonth + 1; year = currentYear;
      if (month > 11) { month = 0; year++; }
      isOther = true;
    } else {
      day = i - startDow + 1;
      month = currentMonth; year = currentYear;
    }

    const dateStr = year + '-' + String(month+1).padStart(2,'0') + '-' + String(day).padStart(2,'0');
    const isToday = !isOther
      && day          === today.getDate()
      && currentMonth === today.getMonth()
      && currentYear  === today.getFullYear();
    const dayJobs = jobMap[dateStr] || [];

    // Build pills
    let pillsHtml = '';
    if (!isOther) {
      dayJobs.slice(0, MAX_SHOW).forEach(j => {
        const label = (j.siteName || j.company || '?') + ' #' + j.ref;
        const pc    = getPillColour(j.engineers);
        const style = pillStyle(pc.colour);
        const dc    = dotClass(j.status);
        const timePrefix = j.jobTime ? `<span style="font-size:9px;opacity:0.8;flex-shrink:0;margin-right:2px;">${j.jobTime}</span>` : '';
        pillsHtml += `<div class="cal-job-pill" style="${style}" onclick="event.stopPropagation();openJobPopup('${j.id}')" title="${label}">
          <div class="pill-status-dot ${dc}"></div>
          ${timePrefix}<span class="pill-text">${label}</span>
        </div>`;
      });
      if (dayJobs.length > MAX_SHOW) {
        const extra = dayJobs.length - MAX_SHOW;
        pillsHtml += `<div class="cal-more-btn" onclick="event.stopPropagation();openDateModal('${dateStr}')">+${extra} more</div>`;
      }
    }

    const cellClick = !isOther && dayJobs.length > 1
      ? `onclick="handleCellClick(event,'${dateStr}',${dayJobs.length})"`
      : !isOther && dayJobs.length === 1
        ? `onclick="handleCellClick(event,'${dateStr}',${dayJobs.length},'${dayJobs[0].id}')"`
        : !isOther
          ? `onclick="handleCellClick(event,'${dateStr}',0)"`
          : '';

    html += `<div class="cal-cell ${isOther?'other-month':''} ${isToday?'today':''}" ${!isOther?`data-date="${dateStr}"`:''}  ${cellClick} style="${dayJobs.length>0&&!isOther?'cursor:pointer;':''}">
      <div class="cal-date-num">${day}</div>
      ${pillsHtml}
      ${!isOther ? `<div class="cal-add-btn" onclick="event.stopPropagation();window.location.href='/Wiggle/new-job.html?date=${dateStr}&from=calendar'">+</div>` : ''}
    </div>`;
  }

  cells.innerHTML = html;
  // Render spanning bars (multi-day jobs + leave) as an absolute overlay
  requestAnimationFrame(renderSpanningOverlay);
}

// ════════════════════════════════════════════
// SPANNING OVERLAY — multi-day jobs + leave bars
// Rendered as absolute-positioned layer so existing
// single-day pill code is completely untouched.
// Bars sit at the bottom of each cell row to avoid
// overlapping the inline pills at the top.
// ════════════════════════════════════════════
function renderSpanningOverlay() {
  const grid = document.getElementById('cal-cells');
  const old  = document.getElementById('cal-span-layer');
  if (old) old.remove();

  // Collect events to render
  const events = [];

  if (showJobs) {
    getVisibleJobs().forEach(j => {
      if (!j.endDate || j.endDate <= j.bookingDate) return;
      events.push({
        type: 'job', id: j.id,
        startDate: j.bookingDate, endDate: j.endDate,
        label: (j.siteName || j.company || '?') + ' #' + j.ref,
        colour: getPillColour(j.engineers).colour,
        statusClass: dotClass(j.status),
        isPending: false,
        onclick: () => openJobPopup(j.id)
      });
    });
  }

  if (showLeave) {
    (appData.leave || []).filter(l => l.status !== 'rejected').forEach(l => {
      const colour = l.status === 'pending' ? LEAVE_PENDING : LEAVE_COLOUR;
      const icon   = l.type === 'Holiday' ? '✈️' : '📅';
      events.push({
        type: 'leave', id: l.id,
        startDate: l.startDate, endDate: l.endDate,
        label: icon + ' ' + l.userName,
        colour, isPending: l.status === 'pending',
        onclick: () => openLeavePopup(l.id)
      });
    });
  }

  if (!events.length) return;

  // Map dateStr → cell position relative to #cal-cells
  const cellPosMap = {};
  grid.querySelectorAll('.cal-cell[data-date]').forEach(el => {
    cellPosMap[el.dataset.date] = {
      left: el.offsetLeft, top: el.offsetTop,
      width: el.offsetWidth, height: el.offsetHeight
    };
  });

  const layer = document.createElement('div');
  layer.id = 'cal-span-layer';
  layer.style.cssText = 'position:absolute;inset:0;pointer-events:none;z-index:5;';

  // Per-row slot tracking so concurrent events stack without overlap
  const rowSlots = {}; // rowTop → boolean[]

  events.forEach(evt => {
    const visibleDates = getDateRange(evt.startDate, evt.endDate).filter(d => cellPosMap[d]);
    if (!visibleDates.length) return;

    // Group dates by calendar row (shared offsetTop)
    const rowGroups = {};
    visibleDates.forEach(d => {
      const rt = cellPosMap[d].top;
      if (!rowGroups[rt]) rowGroups[rt] = [];
      rowGroups[rt].push(d);
    });

    const rowTops = Object.keys(rowGroups).map(Number).sort((a, b) => a - b);

    // Find the first slot free in every row this event touches
    let slot = -1;
    for (let s = 0; s < 6; s++) {
      if (rowTops.every(rt => !(rowSlots[rt] || [])[s])) { slot = s; break; }
    }
    if (slot === -1) return;
    rowTops.forEach(rt => { if (!rowSlots[rt]) rowSlots[rt] = []; rowSlots[rt][slot] = true; });

    // Draw one bar segment per row
    const BAR_H    = 16;
    const BAR_GAP  = 3;
    const FROM_BOT = 4; // px gap from cell bottom

    rowTops.forEach(rt => {
      const rowDates = rowGroups[rt].sort();
      const fp = cellPosMap[rowDates[0]];
      const lp = cellPosMap[rowDates[rowDates.length - 1]];

      const barLeft = fp.left + 2;
      const barTop  = rt + fp.height - FROM_BOT - BAR_H - slot * (BAR_H + BAR_GAP);
      const barW    = (lp.left + lp.width) - fp.left - 4;

      const r = parseInt(evt.colour.slice(1,3),16);
      const g = parseInt(evt.colour.slice(3,5),16);
      const b = parseInt(evt.colour.slice(5,7),16);

      const bar = document.createElement('div');
      bar.className = 'cal-span-bar';
      bar.style.cssText = [
        `position:absolute`,
        `left:${barLeft}px`, `top:${barTop}px`,
        `width:${barW}px`,   `height:${BAR_H}px`,
        `background:rgba(${r},${g},${b},0.15)`,
        `border:1.5px ${evt.isPending ? 'dashed' : 'solid'} ${evt.colour}`,
        `color:${evt.colour}`,
        `border-radius:4px`,
        `display:flex`, `align-items:center`, `gap:3px`,
        `padding:0 5px`, `font-size:10px`, `font-weight:600`,
        `overflow:hidden`, `white-space:nowrap`, `box-sizing:border-box`,
        `pointer-events:auto`, `cursor:pointer`
      ].join(';');

      bar.innerHTML = `<span style="overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0;">${evt.label}</span>`;
      bar.onclick = e => { e.stopPropagation(); evt.onclick(); };
      layer.appendChild(bar);
    });
  });

  grid.appendChild(layer);
}

// ════════════════════════════════════════════
// CELL CLICK — empty space → new job, pill → existing job
// ════════════════════════════════════════════
function handleCellClick(event, dateStr, jobCount, singleJobId) {
  // If click was on a pill, more button or the + add button, let those handle it
  if (event.target.closest('.cal-job-pill') || event.target.closest('.cal-more-btn') || event.target.closest('.cal-add-btn')) return;

  if (jobCount === 0) {
    // Empty cell — go straight to new job with date pre-filled
    window.location.href = '/Wiggle/new-job.html?date=' + dateStr + '&from=calendar';
  } else if (jobCount === 1 && singleJobId) {
    // One job — open popup
    openJobPopup(singleJobId);
  } else {
    // Multiple jobs — open date list modal
    openDateModal(dateStr);
  }
}

function changeMonth(dir) {
  currentMonth += dir;
  if (currentMonth > 11) { currentMonth = 0;  currentYear++; }
  if (currentMonth < 0)  { currentMonth = 11; currentYear--; }
  renderCalendar();
}

function goToToday() {
  const now    = new Date();
  currentYear  = now.getFullYear();
  currentMonth = now.getMonth();
  renderCalendar();
}

// ── DATE MODAL ────────────────────────────────
function openDateModal(dateStr) {
  // Exclude multi-day jobs — they appear in the spanning overlay instead
  const jobs = getVisibleJobs().filter(j => j.bookingDate === dateStr && !(j.endDate && j.endDate > j.bookingDate));
  if (!jobs.length) return;

  const d = new Date(dateStr + 'T00:00:00');
  document.getElementById('modal-date-title').textContent =
    '\uD83D\uDCC5 ' + d.toLocaleDateString('en-GB', { weekday:'long', day:'numeric', month:'long', year:'numeric' });

  document.getElementById('modal-date-body').innerHTML = jobs.map(j => {
    const si  = getStatusInfo(j.status);
    const eng = (j.engineers||[]).map(id => getUserName(id)).join(', ');
    return `<div class="date-job-item" onclick="closeModal('modal-date-jobs');openJobPopup('${j.id}')">
      <div style="flex:1;min-width:0;">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;">
          <span class="date-job-ref">${j.siteName || j.company} #${j.ref}</span>
          <div class="status-pill" style="padding:3px 10px;">
            <div class="status-dot ${si.dot}"></div>
            <span class="status-label" style="font-size:11px;">${si.label}</span>
          </div>
        </div>
        <div class="date-job-company">${j.company}</div>
        <div class="date-job-type">${j.type}${j.jobTime ? ` · <span style="color:var(--primary);font-weight:600;">⏰ ${j.jobTime}</span>` : ''}</div>
        <div class="date-job-engineers">&#128119; ${eng || 'Unassigned'}</div>
      </div>
      <span style="color:var(--primary);font-size:18px;">&#8250;</span>
    </div>`;
  }).join('');

  document.getElementById('modal-date-jobs').classList.remove('hidden');
}

// ── JOB POPUP ─────────────────────────────────
function openJobPopup(id) {
  const j = appData.jobs.find(x => x.id === id);
  if (!j) return;
  selectedJobId = id;

  const si   = getStatusInfo(j.status);
  const over = isOverdue(j);
  const eng  = (j.engineers||[]).map(id => getUserName(id));

  document.getElementById('popup-ref').textContent      = (j.siteName || j.company) + ' #' + j.ref;
  document.getElementById('popup-type').textContent     = j.type;
  document.getElementById('popup-company').textContent  = j.company;
  document.getElementById('popup-date').textContent     = formatDate(j.bookingDate);
  document.getElementById('popup-time').textContent     = j.jobTime || '—';
  document.getElementById('popup-postcode').textContent = j.postcode || '\u2014';
  document.getElementById('popup-rep').textContent      = j.rep || '\u2014';
  document.getElementById('popup-address').textContent  = j.address || '\u2014';
  document.getElementById('popup-desc').textContent     = j.description
    ? j.description.substring(0,120) + (j.description.length > 120 ? '\u2026' : '')
    : 'No description.';

  const dot = document.getElementById('popup-status-dot');
  dot.className = 'status-dot ' + si.dot;
  document.getElementById('popup-status-label').textContent = si.label;
  document.getElementById('popup-overdue').classList.toggle('hidden', !over);

  document.getElementById('popup-engineers').innerHTML = eng.length
    ? eng.map(n => `<span style="font-size:12px;padding:3px 10px;border-radius:20px;background:var(--dark3);color:var(--text-muted);">&#128119; ${n}</span>`).join('')
    : '<span style="color:var(--text-muted);font-size:13px;">Unassigned</span>';

  document.getElementById('modal-date-jobs').classList.add('hidden');
  document.getElementById('modal-job-popup').classList.remove('hidden');
}

function openFullJob() {
  if (!selectedJobId) return;
  window.location.href = '/Wiggle/job-detail.html?id=' + selectedJobId + '&from=calendar';
}

function closeModal(id) { document.getElementById(id).classList.add('hidden'); }

// ════════════════════════════════════════════
// LEAVE — ADD MODAL
// ════════════════════════════════════════════
function openAddLeaveModal(prefillDate) {
  const userSel = document.getElementById('leave-user');
  userSel.innerHTML = '';
  appData.users.forEach(u => {
    const opt = document.createElement('option');
    opt.value = u.id;
    opt.textContent = u.name + (u.role === 'manager' ? ' (Manager)' : u.role === 'accountant' ? ' (Accountant)' : '');
    userSel.appendChild(opt);
  });

  if (currentUser.role !== 'manager') {
    userSel.value    = currentUser.id;
    userSel.disabled = true;
  } else {
    userSel.value    = currentUser.id;
    userSel.disabled = false;
  }

  const today = new Date().toISOString().slice(0, 10);
  const start = prefillDate || today;
  document.getElementById('leave-start').value = start;
  document.getElementById('leave-start').min   = '';
  document.getElementById('leave-end').value   = start;
  document.getElementById('leave-end').min     = start;
  document.getElementById('leave-type').value  = 'Holiday';
  document.getElementById('leave-notes').value = '';

  document.getElementById('modal-add-leave').classList.remove('hidden');
}

function closeAddLeaveModal() {
  document.getElementById('modal-add-leave').classList.add('hidden');
}

function onLeaveStartChange() {
  const start = document.getElementById('leave-start').value;
  const endEl = document.getElementById('leave-end');
  endEl.min = start;
  if (endEl.value < start) endEl.value = start;
}

function submitLeave() {
  const userId    = document.getElementById('leave-user').value;
  const startDate = document.getElementById('leave-start').value;
  const endDate   = document.getElementById('leave-end').value;
  const type      = document.getElementById('leave-type').value;
  const notes     = document.getElementById('leave-notes').value.trim();

  if (!userId)    { showToast('Please select a staff member.', 'error'); return; }
  if (!startDate) { showToast('Please select a start date.', 'error');  return; }
  if (!endDate)   { showToast('Please select an end date.', 'error');   return; }
  if (endDate < startDate) { showToast('End date must be on or after start date.', 'error'); return; }

  const user = appData.users.find(u => u.id === userId);
  const leaveItem = {
    id:        genLeaveId(),
    userId,
    userName:  user ? user.name : 'Unknown',
    startDate, endDate, type, notes,
    status:    'pending',
    createdAt: new Date().toISOString(),
    approvedBy: null
  };

  appData.leave.push(leaveItem);
  _saveLeave(leaveItem)
    .then(() => {
      showToast('Leave request submitted — awaiting manager approval.', 'success');
      closeAddLeaveModal();
      renderCalendar();
    })
    .catch(err => {
      console.error('Leave save error', err);
      showToast('Error saving leave request. Please try again.', 'error');
    });
}

// ════════════════════════════════════════════
// LEAVE — DETAIL POPUP
// ════════════════════════════════════════════
function openLeavePopup(id) {
  const l = (appData.leave || []).find(x => x.id === id);
  if (!l) return;
  selectedLeaveId = id;

  const icon = l.type === 'Holiday' ? '✈️' : '📅';
  document.getElementById('leave-popup-title').textContent = icon + ' ' + l.type + ' — ' + l.userName;

  const statusColor = l.status === 'approved' ? '#22c55e' : l.status === 'pending' ? '#f59e0b' : '#ef4444';
  const statusLabel = l.status === 'approved' ? 'Approved' : l.status === 'pending' ? 'Pending Approval' : 'Rejected';

  document.getElementById('leave-popup-details').innerHTML = `
    <div class="popup-grid" style="margin-bottom:16px;">
      <div class="popup-section">
        <label>Staff Member</label>
        <div class="val">${l.userName}</div>
      </div>
      <div class="popup-section">
        <label>Status</label>
        <div class="val" style="color:${statusColor};font-weight:700;">${statusLabel}</div>
      </div>
      <div class="popup-section">
        <label>From</label>
        <div class="val">${formatDate(l.startDate)}</div>
      </div>
      <div class="popup-section">
        <label>To</label>
        <div class="val">${formatDate(l.endDate)}</div>
      </div>
      <div class="popup-section">
        <label>Type</label>
        <div class="val">${l.type}</div>
      </div>
      ${l.approvedBy ? `<div class="popup-section"><label>Approved By</label><div class="val">${l.approvedBy}</div></div>` : ''}
    </div>
    ${l.notes ? `<div class="popup-section"><label>Notes</label><div class="val" style="font-size:13px;color:var(--text-muted);line-height:1.6;">${l.notes}</div></div>` : ''}
  `;

  const actionsEl = document.getElementById('leave-popup-actions');
  const showActions = currentUser.role === 'manager' && l.status === 'pending';
  actionsEl.style.display = showActions ? 'flex' : 'none';

  document.getElementById('modal-leave-popup').classList.remove('hidden');
}

function approveLeave() {
  const l = (appData.leave || []).find(x => x.id === selectedLeaveId);
  if (!l) return;
  l.status     = 'approved';
  l.approvedBy = currentUser.name;
  _saveLeave(l)
    .then(() => {
      showToast('Leave approved.', 'success');
      closeModal('modal-leave-popup');
      renderCalendar();
    })
    .catch(err => { console.error(err); showToast('Error approving leave.', 'error'); });
}

function rejectLeave() {
  const l = (appData.leave || []).find(x => x.id === selectedLeaveId);
  if (!l) return;
  l.status = 'rejected';
  _saveLeave(l)
    .then(() => {
      showToast('Leave rejected.', 'success');
      closeModal('modal-leave-popup');
      renderCalendar();
    })
    .catch(err => { console.error(err); showToast('Error rejecting leave.', 'error'); });
}
</script>
