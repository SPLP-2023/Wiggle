async function uploadRules() {
  const btn = document.getElementById('btn');
  const log = document.getElementById('log');
  btn.disabled = true;
  btn.textContent = 'Uploading...';
  log.innerHTML = '';

  try {
    if (!firebase.apps.length) firebase.initializeApp(_firebaseConfig);
    const db = firebase.firestore();

    // Upload in batches of 500
    const batchSize = 400;
    let uploaded = 0;
    for (let i = 0; i < VAT_RULES.length; i += batchSize) {
      const batch = db.batch();
      const chunk = VAT_RULES.slice(i, i + batchSize);
      chunk.forEach(rule => {
        const ref = db.collection('vat_rules').doc(rule.keyword.replace(/[^a-zA-Z0-9]/g, '_'));
        batch.set(ref, rule);
      });
      await batch.commit();
      uploaded += chunk.length;
      log.innerHTML += '<div class="success">✓ Uploaded ' + uploaded + ' / ' + VAT_RULES.length + ' rules</div>';
    }
    log.innerHTML += '<div class="success" style="font-weight:700;margin-top:8px;">✅ All ' + VAT_RULES.length + ' rules uploaded successfully!</div>';
    btn.textContent = 'Done!';
  } catch(err) {
    log.innerHTML += '<div class="error">❌ Error: ' + err.message + '</div>';
    btn.disabled = false;
    btn.textContent = 'Retry';
  }
}
