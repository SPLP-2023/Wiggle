<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="manifest" href="/Wiggle/manifest.json">
  <meta name="theme-color" content="#f59e0b">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Invoices - Strike Point CRM</title>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    :root { --primary:#f59e0b; --primary-dark:#d97706; --dark:#0f172a; --dark2:#1e293b; --dark3:#334155; --text:#f1f5f9; --text-muted:#94a3b8; --card-bg:#1e293b; --border:#334155; --success:#22c55e; --danger:#ef4444; --info:#3b82f6; --radius:10px; --shadow:0 4px 24px rgba(0,0,0,0.4); }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { font-family:'Segoe UI',system-ui,sans-serif; background:var(--dark); color:var(--text); min-height:100vh; }
    nav { background:var(--dark2); border-bottom:1px solid var(--border); padding:0 20px; height:60px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100; }
    .nav-brand { display:flex; align-items:center; gap:9px; cursor:pointer; }
    .nav-brand span { font-weight:700; font-size:15px; color:var(--primary); }
    .nav-right { display:flex; align-items:center; gap:10px; }
    .user-badge { display:flex; align-items:center; gap:8px; background:var(--dark3); border-radius:8px; padding:5px 11px; font-size:13px; }
    .user-avatar { width:28px; height:28px; border-radius:50%; background:var(--primary); display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:700; color:var(--dark); }
    .btn { display:inline-flex; align-items:center; justify-content:center; gap:7px; padding:10px 20px; border-radius:var(--radius); font-size:13px; font-weight:600; cursor:pointer; border:none; transition:all 0.2s; white-space:nowrap; }
    .btn-primary { background:var(--primary); color:var(--dark); } .btn-primary:hover { background:var(--primary-dark); }
    .btn-secondary { background:var(--dark3); color:var(--text); } .btn-secondary:hover { background:#475569; }
    .btn-danger { background:var(--danger); color:#fff; }
    .btn-success { background:var(--success); color:#fff; }
    .btn-sm { padding:7px 14px; font-size:12px; } .btn-xs { padding:5px 10px; font-size:11px; }
    main { max-width:1000px; margin:0 auto; padding:24px 20px 60px; }
    .page-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:24px; flex-wrap:wrap; gap:12px; }
    .page-title { font-size:22px; font-weight:800; } .page-title span { color:var(--primary); }
    .filter-bar { display:flex; gap:10px; margin-bottom:20px; flex-wrap:wrap; }
    .filter-btn { padding:7px 16px; border-radius:20px; background:var(--dark2); border:1px solid var(--border); color:var(--text-muted); font-size:13px; cursor:pointer; transition:all 0.2s; }
    .filter-btn.active { background:var(--primary); color:var(--dark); border-color:var(--primary); font-weight:600; }
    .search-input { flex:1; min-width:200px; padding:8px 14px; background:var(--dark2); border:1px solid var(--border); border-radius:var(--radius); color:var(--text); font-size:14px; }
    .search-input:focus { outline:none; border-color:var(--primary); } .search-input::placeholder { color:var(--text-muted); }
    .inv-row { background:var(--card-bg); border:1px solid var(--border); border-radius:12px; padding:16px 18px; display:flex; align-items:center; gap:14px; flex-wrap:wrap; transition:border-color 0.2s; margin-bottom:10px; }
    .inv-row:hover { border-color:var(--primary); }
    .inv-row-info { flex:1; min-width:200px; }
    .iref { font-size:12px; font-weight:700; color:var(--primary); }
    .icompany { font-size:15px; font-weight:600; margin-top:2px; }
    .imeta { font-size:12px; color:var(--text-muted); margin-top:3px; }
    .inv-row-right { display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
    .itotal { font-size:16px; font-weight:700; }
    .sbadge { font-size:11px; padding:3px 10px; border-radius:20px; font-weight:600; white-space:nowrap; }
    .badge-draft { background:rgba(148,163,184,0.2); color:#94a3b8; } .badge-sent { background:rgba(59,130,246,0.2); color:#3b82f6; }
    .badge-paid { background:rgba(34,197,94,0.2); color:#22c55e; } .badge-overdue { background:rgba(239,68,68,0.2); color:#ef4444; }
    .badge-cancelled { background:rgba(148,163,184,0.2); color:#94a3b8; }
    .empty-state { text-align:center; padding:60px 20px; color:var(--text-muted); }
    .editor { background:var(--card-bg); border:1px solid var(--border); border-radius:14px; padding:24px; }
    .editor-header { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:20px; flex-wrap:wrap; gap:10px; }
    .editor-title { font-size:18px; font-weight:800; } .editor-ref { font-size:12px; color:var(--primary); margin-top:4px; }
    .editor-actions { display:flex; gap:8px; flex-wrap:wrap; }
    .sec-div { font-size:12px; font-weight:700; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.5px; padding:10px 0 8px; border-bottom:1px solid var(--border); margin-bottom:16px; margin-top:4px; }
    .form-group { margin-bottom:14px; }
    .form-group label { display:block; font-size:12px; font-weight:600; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.4px; margin-bottom:7px; }
    .form-input { width:100%; padding:10px 13px; background:var(--dark); border:1px solid var(--border); border-radius:8px; color:var(--text); font-size:14px; font-family:inherit; }
    .form-input:focus { outline:none; border-color:var(--primary); } .form-input::placeholder { color:var(--text-muted); }
    .form-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    .li-table { width:100%; border-collapse:collapse; margin-bottom:12px; }
    .li-table th { font-size:11px; color:var(--text-muted); text-transform:uppercase; padding:8px; text-align:left; border-bottom:1px solid var(--border); }
    .li-table td { padding:5px; vertical-align:middle; }
    .li-inp { width:100%; padding:7px 9px; background:var(--dark); border:1px solid var(--border); border-radius:6px; color:var(--text); font-size:13px; font-family:inherit; }
    .li-inp:focus { outline:none; border-color:var(--primary); }
    .add-line-btn { font-size:13px; color:var(--primary); background:none; border:1px dashed var(--primary); border-radius:8px; padding:8px 16px; cursor:pointer; }
    .add-line-btn:hover { background:rgba(245,158,11,0.08); }
    .totals-box { background:var(--dark); border:1px solid var(--border); border-radius:10px; padding:16px 20px; max-width:300px; margin-left:auto; margin-top:16px; }
    .tot-row { display:flex; justify-content:space-between; padding:5px 0; font-size:14px; }
    .tot-row.grand { border-top:1px solid var(--border); margin-top:6px; padding-top:10px; font-size:17px; font-weight:800; color:var(--primary); }
    .status-bar { display:flex; align-items:center; gap:10px; background:var(--dark); border:1px solid var(--border); border-radius:10px; padding:12px 16px; margin-bottom:16px; flex-wrap:wrap; }
    .overdue-banner { background:rgba(239,68,68,0.12); border:1px solid var(--danger); border-radius:10px; padding:12px 16px; margin-bottom:16px; font-size:14px; color:var(--danger); font-weight:600; }
    .toast { position:fixed; bottom:24px; right:24px; background:var(--dark2); border:1px solid var(--border); border-radius:var(--radius); padding:14px 20px; font-size:14px; z-index:999; transform:translateY(100px); opacity:0; transition:all 0.3s; max-width:340px; }
    .toast.show { transform:translateY(0); opacity:1; } .toast.success { border-color:var(--success); } .toast.error { border-color:var(--danger); }
    .hidden { display:none !important; }
    @media(max-width:640px) { .form-row { grid-template-columns:1fr; } }
  </style>
</head>
<body>
<nav>
  <div class="nav-brand" onclick="window.location.href='/Wiggle/customers.html'">
    <img src="https://raw.githubusercontent.com/SPLP-2023/tool/refs/heads/main/icons/icon-192x192.png" alt="Logo" style="width:36px;height:36px;object-fit:contain;">
    <span>Strike Point CRM</span>
  </div>
  <div class="nav-right">
    <button class="btn btn-secondary btn-sm" id="btn-back">&#8592; Back</button>
    <div class="user-badge"><div class="user-avatar" id="user-avatar">?</div><span id="user-name-display">-</span></div>
  </div>
</nav>
<main>
  <div id="view-list">
    <div class="page-header">
      <div class="page-title">&#129534; <span>Invoices</span></div>
      <button class="btn btn-primary" onclick="openNewInvoice(null)">&#43; New Invoice</button>
    </div>
    <div class="filter-bar">
      <input type="text" class="search-input" id="i-search" placeholder="Search invoices..." oninput="renderList()">
      <button class="filter-btn active" onclick="setFilter('all',this)">All</button>
      <button class="filter-btn" onclick="setFilter('draft',this)">Draft</button>
      <button class="filter-btn" onclick="setFilter('sent',this)">Sent</button>
      <button class="filter-btn" onclick="setFilter('overdue',this)">Overdue</button>
      <button class="filter-btn" onclick="setFilter('paid',this)">Paid</button>
    </div>
    <div id="inv-list"></div>
    <div class="empty-state hidden" id="i-empty"><div style="font-size:40px;margin-bottom:12px;">&#129534;</div><p>No invoices found.</p></div>
  </div>
  <div id="view-editor" class="hidden">
    <div class="editor">
      <div class="editor-header">
        <div style="flex:1;min-width:0;"><div class="editor-title" id="editor-title">New Invoice</div><div class="editor-ref" id="editor-ref"></div></div>
        <div class="editor-actions">
          <button class="btn btn-secondary btn-sm" onclick="closeEditor()">&#8592; Back</button>
          <button class="btn btn-secondary btn-sm hidden" id="btn-pdf" onclick="generatePDF()">&#128438; PDF</button>
          <button class="btn btn-primary btn-sm" id="btn-save" onclick="saveInvoice()">Save Invoice</button>
        </div>
      </div>
      <div class="overdue-banner hidden" id="overdue-banner">&#9888; This invoice is overdue. Due: <span id="overdue-date"></span></div>
      <div class="status-bar hidden" id="status-bar">
        <span style="font-size:13px;color:var(--text-muted);">Status:</span>
        <span class="sbadge" id="status-badge">Draft</span>
        <div style="flex:1;"></div>
        <button class="btn btn-xs btn-secondary" id="btn-mark-sent"      onclick="setStatus('sent')">Mark Sent</button>
        <button class="btn btn-xs btn-success"   id="btn-mark-paid"      onclick="setStatus('paid')">Mark Paid</button>
        <button class="btn btn-xs btn-danger"    id="btn-mark-overdue"   onclick="setStatus('overdue')">Mark Overdue</button>
        <button class="btn btn-xs btn-secondary" id="btn-mark-cancelled" onclick="setStatus('cancelled')">Cancel</button>
      </div>
      <div class="sec-div">Customer &amp; Invoice Details</div>
      <div class="form-row">
        <div class="form-group"><label>Customer *</label><select class="form-input" id="i-customer" onchange="onCustomerChange()"><option value="">-- Select Customer --</option></select></div>
        <div class="form-group"><label>Invoice Number</label><input type="text" class="form-input" id="i-number" placeholder="e.g. INV-0001"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Site Reference</label><input type="text" class="form-input" id="i-site-ref" placeholder="Site reference"></div>
        <div class="form-group"><label>Order Reference</label><input type="text" class="form-input" id="i-order-ref" placeholder="Purchase order number"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Invoice Date</label><input type="date" class="form-input" id="i-date"></div>
        <div class="form-group"><label>Due Date (30 days)</label><input type="date" class="form-input" id="i-due-date"></div>
      </div>
      <div class="sec-div">Client Details</div>
      <div class="form-row">
        <div class="form-group"><label>Client Name</label><input type="text" class="form-input" id="i-client-name" placeholder="Company name"></div>
        <div class="form-group"><label>Invoice Email</label><input type="email" class="form-input" id="i-client-email" placeholder="Accounts / invoice email"></div>
      </div>
      <div class="form-group"><label>Billing Address</label><input type="text" class="form-input" id="i-client-address" placeholder="Billing address"></div>
      <div class="sec-div">Line Items</div>
      <table class="li-table">
        <thead><tr>
          <th style="width:44%;">Description</th><th style="width:10%;text-align:center;">Qty</th>
          <th style="width:14%;">Unit Price</th><th style="width:10%;text-align:center;">VAT %</th>
          <th style="width:14%;text-align:right;">Amount Due</th><th style="width:8%;"></th>
        </tr></thead>
        <tbody id="li-body"></tbody>
      </table>
      <button class="add-line-btn" onclick="addLine()">&#43; Add Line Item</button>
      <div class="totals-box">
        <div class="tot-row"><span>Subtotal</span><span id="t-sub">&#163;0.00</span></div>
        <div class="tot-row"><span>VAT</span><span id="t-vat">&#163;0.00</span></div>
        <div class="tot-row grand"><span>Total Due</span><span id="t-total">&#163;0.00</span></div>
      </div>
      <div class="sec-div" style="margin-top:20px;">Notes</div>
      <div class="form-group"><textarea class="form-input" id="i-notes" rows="3" style="resize:vertical;" placeholder="Any additional notes..."></textarea></div>
    </div>
  </div>
</main>
<div class="toast" id="toast"></div>
<script src="/Wiggle/js/data.js"></script>
<script id="app-script">
var currentUser,allInvoices=[],allCustomers=[],lineItems=[];
var currentInvoiceId=null,currentCustomerId=null,filterStatus='all',invoiceCounter=1;

document.addEventListener('DOMContentLoaded',function(){
  currentUser=requireAuth();
  if(!currentUser)return;
  if(currentUser.role!=='manager'){window.location.href='/Wiggle/index.html';return;}
  document.getElementById('user-avatar').textContent=currentUser.name[0].toUpperCase();
  document.getElementById('user-name-display').textContent=currentUser.name;
  var params=new URLSearchParams(window.location.search);
  var iid=params.get('id');
  currentCustomerId=params.get('customer');
  document.getElementById('btn-back').onclick=function(){
    if(currentCustomerId)window.location.href='/Wiggle/crm-customer.html?id='+currentCustomerId;
    else window.location.href='/Wiggle/customers.html';
  };
  document.getElementById('i-date').addEventListener('change',function(){
    var d=new Date(this.value);d.setDate(d.getDate()+30);
    document.getElementById('i-due-date').value=d.toISOString().split('T')[0];
  });
  showLoader();
  initFirebase().then(function(){
    hideLoader();
    loadCustomersDD(function(){
      getCount(function(){
        if(iid)openExistingInvoice(iid);
        else if(currentCustomerId)openNewInvoice(currentCustomerId);
        else loadInvoices();
      });
    });
  }).catch(function(){hideLoader();showToast('Connection error.','error');});
});

function loadCustomersDD(cb){
  _db.collection('crm_customers').orderBy('company').get().then(function(snap){
    allCustomers=snap.docs.map(function(d){return Object.assign({id:d.id},d.data());});
    var sel=document.getElementById('i-customer');
    sel.innerHTML='<option value="">-- Select Customer --</option>';
    allCustomers.forEach(function(c){
      var o=document.createElement('option');
      o.value=c.id;o.textContent=c.company+(c.clientRef?' (#'+c.clientRef+')':'');
      sel.appendChild(o);
    });
    if(cb)cb();
  }).catch(function(){if(cb)cb();});
}

function getCount(cb){
  _db.collection('crm_invoices').get().then(function(s){
    invoiceCounter=s.size+1;if(cb)cb();
  }).catch(function(){if(cb)cb();});
}

function loadInvoices(){
  var today=new Date().toISOString().split('T')[0];
  _db.collection('crm_invoices').orderBy('createdAt','desc').get().then(function(snap){
    allInvoices=snap.docs.map(function(d){return Object.assign({id:d.id},d.data());});
    allInvoices.forEach(function(inv){
      if(inv.status==='sent'&&inv.dueDate&&inv.dueDate<today){
        _db.collection('crm_invoices').doc(inv.id).update({status:'overdue'});
        inv.status='overdue';
      }
    });
    renderList();
  }).catch(function(err){console.error(err);showToast('Error loading.','error');});
}

function setFilter(s,btn){
  filterStatus=s;
  document.querySelectorAll('.filter-btn').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active');renderList();
}

function renderList(){
  var q=(document.getElementById('i-search').value||'').toLowerCase();
  var f=allInvoices.filter(function(inv){
    return(filterStatus==='all'||inv.status===filterStatus)&&
      (!q||(inv.number||'').toLowerCase().includes(q)||(inv.company||'').toLowerCase().includes(q));
  });
  var list=document.getElementById('inv-list'),empty=document.getElementById('i-empty');
  if(!f.length){list.innerHTML='';empty.classList.remove('hidden');return;}
  empty.classList.add('hidden');
  list.innerHTML=f.map(function(inv){
    var col=inv.status==='paid'?'color:var(--success);':inv.status==='overdue'?'color:var(--danger);':'';
    return '<div class="inv-row">'
      +'<div class="inv-row-info"><div class="iref">'+esc(inv.number||'-')+'</div>'
      +'<div class="icompany">'+esc(inv.company||'-')+'</div>'
      +'<div class="imeta">Due: '+formatDate(inv.dueDate)+' &middot; '+esc(inv.siteRef||'-')+'</div></div>'
      +'<div class="inv-row-right">'
      +'<span class="sbadge badge-'+esc(inv.status)+'">'+cap(inv.status)+'</span>'
      +'<span class="itotal" style="'+col+'">'+fmtMoney(inv.totalDue||0)+'</span>'
      +'<button class="btn btn-secondary btn-xs" onclick="openExistingInvoice(\''+esc(inv.id)+'\')">View</button>'
      +'<button class="btn btn-danger btn-xs" onclick="confirmDelete(\''+esc(inv.id)+'\')">&#128465;</button>'
      +'</div></div>';
  }).join('');
}

function openNewInvoice(preselectCid){
  currentInvoiceId=null;lineItems=[];
  document.getElementById('view-list').classList.add('hidden');
  document.getElementById('view-editor').classList.remove('hidden');
  document.getElementById('editor-title').textContent='New Invoice';
  document.getElementById('editor-ref').textContent='';
  document.getElementById('status-bar').classList.add('hidden');
  document.getElementById('overdue-banner').classList.add('hidden');
  document.getElementById('btn-pdf').classList.add('hidden');
  document.getElementById('btn-save').textContent='Save Invoice';
  var now=new Date(),due=new Date(now);due.setDate(due.getDate()+30);
  document.getElementById('i-date').value=now.toISOString().split('T')[0];
  document.getElementById('i-due-date').value=due.toISOString().split('T')[0];
  document.getElementById('i-number').value='INV-'+String(invoiceCounter).padStart(4,'0');
  ['i-site-ref','i-order-ref','i-client-name','i-client-email','i-client-address','i-notes'].forEach(function(id){document.getElementById(id).value='';});
  document.getElementById('i-customer').value=preselectCid||'';
  if(preselectCid){currentCustomerId=preselectCid;onCustomerChange();}
  addLine();recalc();
}

function openExistingInvoice(id){
  _db.collection('crm_invoices').doc(id).get().then(function(doc){
    if(!doc.exists){showToast('Invoice not found.','error');return;}
    var inv=Object.assign({id:doc.id},doc.data());
    currentInvoiceId=id;currentCustomerId=inv.customerId||null;
    document.getElementById('view-list').classList.add('hidden');
    document.getElementById('view-editor').classList.remove('hidden');
    document.getElementById('editor-title').textContent=inv.number||'Invoice';
    document.getElementById('editor-ref').textContent=inv.ref||'';
    document.getElementById('btn-pdf').classList.remove('hidden');
    document.getElementById('btn-save').textContent='Save Changes';
    document.getElementById('status-bar').classList.remove('hidden');
    updateStatusBadge(inv.status||'draft');
    var today=new Date().toISOString().split('T')[0];
    if((inv.status==='sent'||inv.status==='overdue')&&inv.dueDate&&inv.dueDate<today){
      document.getElementById('overdue-date').textContent=formatDate(inv.dueDate);
      document.getElementById('overdue-banner').classList.remove('hidden');
    } else {document.getElementById('overdue-banner').classList.add('hidden');}
    document.getElementById('i-customer').value=inv.customerId||'';
    document.getElementById('i-number').value=inv.number||'';
    document.getElementById('i-site-ref').value=inv.siteRef||'';
    document.getElementById('i-order-ref').value=inv.orderRef||'';
    document.getElementById('i-date').value=inv.invoiceDate||'';
    document.getElementById('i-due-date').value=inv.dueDate||'';
    document.getElementById('i-client-name').value=inv.clientName||'';
    document.getElementById('i-client-email').value=inv.clientEmail||'';
    document.getElementById('i-client-address').value=inv.clientAddress||'';
    document.getElementById('i-notes').value=inv.notes||'';
    lineItems=(inv.lineItems||[]).map(function(li){return Object.assign({},li);});
    renderLines();recalc();
  }).catch(function(err){console.error(err);showToast('Error loading.','error');});
}

function closeEditor(){
  document.getElementById('view-editor').classList.add('hidden');
  document.getElementById('view-list').classList.remove('hidden');
  currentInvoiceId=null;loadInvoices();
}

function onCustomerChange(){
  var cid=document.getElementById('i-customer').value;if(!cid)return;
  var c=allCustomers.find(function(x){return x.id===cid;});if(!c)return;
  currentCustomerId=cid;
  document.getElementById('i-client-name').value=c.company||'';
  document.getElementById('i-client-email').value=c.invoiceEmail||c.email||'';
  document.getElementById('i-client-address').value=c.invoiceAddress||'';
}

function addLine(){lineItems.push({description:'',qty:1,unitPrice:0,vatRate:20});renderLines();}

function renderLines(){
  var tbody=document.getElementById('li-body');
  if(!lineItems.length){tbody.innerHTML='';return;}
  tbody.innerHTML=lineItems.map(function(li,i){
    var net=(parseFloat(li.qty)||0)*(parseFloat(li.unitPrice)||0);
    var vat=net*((parseFloat(li.vatRate)||0)/100);
    return '<tr>'
      +'<td><input class="li-inp" type="text" value="'+esc(li.description)+'" placeholder="Description..." oninput="updateLI('+i+',\'description\',this.value)"></td>'
      +'<td><input class="li-inp" type="number" min="0.01" step="0.01" value="'+(li.qty||1)+'" style="text-align:center;" onchange="updateLI('+i+',\'qty\',this.value)"></td>'
      +'<td><input class="li-inp" type="number" min="0" step="0.01" value="'+(li.unitPrice||'')+'" placeholder="0.00" onchange="updateLI('+i+',\'unitPrice\',this.value)"></td>'
      +'<td><select class="li-inp" onchange="updateLI('+i+',\'vatRate\',this.value)">'
      +'<option value="20"'+(li.vatRate==20?' selected':'')+'>20%</option>'
      +'<option value="0"'+(li.vatRate==0?' selected':'')+'>0%</option>'
      +'<option value="5"'+(li.vatRate==5?' selected':'')+'>5%</option>'
      +'</select></td>'
      +'<td style="text-align:right;font-weight:600;padding-right:6px;">'+fmtMoney(net+vat)+'</td>'
      +'<td style="text-align:center;"><button class="btn btn-danger btn-xs" onclick="removeLI('+i+')">&#10005;</button></td>'
      +'</tr>';
  }).join('');
}

function updateLI(i,field,val){
  lineItems[i][field]=(field==='qty'||field==='unitPrice'||field==='vatRate')?parseFloat(val)||0:val;
  renderLines();recalc();
}
function removeLI(i){lineItems.splice(i,1);renderLines();recalc();}

function recalc(){
  var sub=0,vat=0;
  lineItems.forEach(function(li){
    var net=(parseFloat(li.qty)||0)*(parseFloat(li.unitPrice)||0);
    sub+=net;vat+=net*((parseFloat(li.vatRate)||0)/100);
  });
  document.getElementById('t-sub').textContent=fmtMoney(sub);
  document.getElementById('t-vat').textContent=fmtMoney(vat);
  document.getElementById('t-total').textContent=fmtMoney(sub+vat);
  return{subtotal:sub,vat:vat,total:sub+vat};
}

function saveInvoice(){
  var cid=document.getElementById('i-customer').value;
  if(!cid){showToast('Please select a customer.','error');return;}
  if(!lineItems.length){showToast('Please add at least one line item.','error');return;}
  var number=document.getElementById('i-number').value.trim();
  if(!number){showToast('Please enter an invoice number.','error');return;}
  var c=allCustomers.find(function(x){return x.id===cid;})||{};
  var t=recalc();
  var data={
    customerId:cid,company:c.company||'',clientRef:c.clientRef||'',
    number:number,ref:number,
    siteRef:document.getElementById('i-site-ref').value.trim(),
    orderRef:document.getElementById('i-order-ref').value.trim(),
    invoiceDate:document.getElementById('i-date').value,
    dueDate:document.getElementById('i-due-date').value,
    clientName:document.getElementById('i-client-name').value.trim(),
    clientEmail:document.getElementById('i-client-email').value.trim(),
    clientAddress:document.getElementById('i-client-address').value.trim(),
    notes:document.getElementById('i-notes').value.trim(),
    lineItems:lineItems,subtotal:t.subtotal,vat:t.vat,totalDue:t.total,
    updatedAt:new Date().toISOString()
  };
  var btn=document.getElementById('btn-save');btn.disabled=true;btn.textContent='Saving...';
  var p=currentInvoiceId
    ?_db.collection('crm_invoices').doc(currentInvoiceId).update(data)
    :_db.collection('crm_invoices').add(Object.assign({status:'draft',createdAt:new Date().toISOString()},data));
  p.then(function(ref){
    if(!currentInvoiceId&&ref){
      currentInvoiceId=ref.id;invoiceCounter++;
      document.getElementById('editor-title').textContent=number;
      document.getElementById('btn-pdf').classList.remove('hidden');
      document.getElementById('btn-save').textContent='Save Changes';
      document.getElementById('status-bar').classList.remove('hidden');
      updateStatusBadge('draft');
    }
    showToast('Invoice saved','success');
  }).catch(function(err){console.error(err);showToast('Error saving.','error');})
  .finally(function(){btn.disabled=false;btn.textContent=currentInvoiceId?'Save Changes':'Save Invoice';});
}

function setStatus(status){
  if(!currentInvoiceId){showToast('Save first.','error');return;}
  _db.collection('crm_invoices').doc(currentInvoiceId).update({status:status,updatedAt:new Date().toISOString()}).then(function(){
    updateStatusBadge(status);
    if(status==='paid')document.getElementById('overdue-banner').classList.add('hidden');
    showToast('Status: '+cap(status),'success');
  }).catch(function(err){console.error(err);showToast('Error.','error');});
}

function updateStatusBadge(s){
  var b=document.getElementById('status-badge');b.textContent=cap(s);b.className='sbadge badge-'+s;
  document.getElementById('btn-mark-sent').style.display=(s==='draft')?'inline-flex':'none';
  document.getElementById('btn-mark-paid').style.display=(s==='sent'||s==='overdue')?'inline-flex':'none';
  document.getElementById('btn-mark-overdue').style.display=(s==='sent')?'inline-flex':'none';
  document.getElementById('btn-mark-cancelled').style.display=(s!=='paid'&&s!=='cancelled')?'inline-flex':'none';
}

function confirmDelete(id){
  if(!confirm('Delete this invoice?'))return;
  _db.collection('crm_invoices').doc(id).delete().then(function(){
    showToast('Deleted','success');loadInvoices();
  }).catch(function(err){console.error(err);showToast('Error.','error');});
}

function generatePDF(){
  var cid=document.getElementById('i-customer').value;
  var c=allCustomers.find(function(x){return x.id===cid;})||{};
  var t=recalc();
  var d={
    number:document.getElementById('i-number').value,
    siteRef:document.getElementById('i-site-ref').value,
    orderRef:document.getElementById('i-order-ref').value,
    invoiceDate:document.getElementById('i-date').value,
    dueDate:document.getElementById('i-due-date').value,
    clientName:document.getElementById('i-client-name').value,
    clientEmail:document.getElementById('i-client-email').value,
    clientAddress:document.getElementById('i-client-address').value,
    notes:document.getElementById('i-notes').value,
    company:c.company||'',clientRef:c.clientRef||'',
    lineItems:lineItems,subtotal:t.subtotal,vat:t.vat,total:t.total
  };
  var btn=document.getElementById('btn-pdf');btn.disabled=true;btn.textContent='Building...';
  loadImgB64('https://raw.githubusercontent.com/SPLP-2023/tool/refs/heads/main/icons/icon-192x192.png',function(logo){
    try{
      var pdf=new window.jspdf.jsPDF();
      buildPDF(pdf,d,logo);
      pdf.save((d.number||'invoice')+'.pdf');
    }catch(e){console.error(e);showToast('PDF error.','error');}
    btn.disabled=false;btn.innerHTML='&#128438; PDF';
  });
}

function buildPDF(pdf,d,logo){
  var lm=20,pw=170;
  if(logo)pdf.addImage(logo,'PNG',148,8,42,32);
  pdf.setFontSize(10);pdf.setFont(undefined,'bold');
  pdf.text('Strike Point Lightning Protection Ltd',lm,16);
  pdf.setFont(undefined,'normal');
  pdf.text('Company No: 15114852  |  VAT No: 448 8105 74',lm,22);
  pdf.text('info@strikepoint.uk  |  accounts@strikepoint.uk',lm,28);
  pdf.text('Tel: 0115 990 3220',lm,34);
  pdf.setFontSize(28);pdf.setFont(undefined,'bold');
  pdf.text('INVOICE',105,52,{align:'center'});
  var my=64;
  var labs=['Invoice No:','Site Ref:','Order Ref:','Invoice Date:','Due Date:'];
  var vals=[d.number,d.siteRef,d.orderRef,fmtDate(d.invoiceDate),fmtDate(d.dueDate)];
  pdf.setFontSize(10);
  for(var i=0;i<labs.length;i++){
    pdf.setFont(undefined,'bold');pdf.text(labs[i],lm,my+i*8);
    pdf.setFont(undefined,'normal');pdf.text(String(vals[i]||''),lm+30,my+i*8);
  }
  var cx=110,cy=64;
  pdf.setFont(undefined,'bold');pdf.text('Bill To:',cx,cy);cy+=7;
  pdf.setFont(undefined,'normal');
  if(d.clientName){pdf.text(d.clientName,cx,cy);cy+=6;}
  if(d.clientEmail){pdf.text(d.clientEmail,cx,cy);cy+=6;}
  if(d.clientAddress){pdf.splitTextToSize(d.clientAddress,72).forEach(function(l){pdf.text(l,cx,cy);cy+=6;});}
  var ty=114;
  pdf.setFillColor(30,41,59);pdf.rect(lm,ty-5,pw,9,'F');
  pdf.setTextColor(241,245,249);pdf.setFont(undefined,'bold');pdf.setFontSize(9);
  pdf.text('Description',lm+2,ty);pdf.text('Qty',116,ty,{align:'right'});
  pdf.text('Unit Price',138,ty,{align:'right'});pdf.text('VAT',156,ty,{align:'right'});
  pdf.text('Amount Due',lm+pw,ty,{align:'right'});
  pdf.setTextColor(0,0,0);ty+=8;
  pdf.setFont(undefined,'normal');pdf.setFontSize(9);
  var alt=false;
  d.lineItems.forEach(function(li){
    var net=(parseFloat(li.qty)||0)*(parseFloat(li.unitPrice)||0);
    var vat=net*((parseFloat(li.vatRate)||0)/100);
    if(alt){pdf.setFillColor(245,245,248);pdf.rect(lm,ty-5,pw,8,'F');}
    alt=!alt;
    var dl=pdf.splitTextToSize(li.description||'',78);
    pdf.text(dl[0]||'',lm+2,ty);
    pdf.text(String(li.qty||1),116,ty,{align:'right'});
    pdf.text(fmtMoney(li.unitPrice||0),138,ty,{align:'right'});
    pdf.text((li.vatRate||0)+'%',156,ty,{align:'right'});
    pdf.text(fmtMoney(net+vat),lm+pw,ty,{align:'right'});
    ty+=8;
    if(ty>230){addFtr(pdf);pdf.addPage();ty=20;}
  });
  ty+=8;
  pdf.setFontSize(10);pdf.setFont(undefined,'normal');
  pdf.text('Subtotal:',146,ty,{align:'right'});pdf.text(fmtMoney(d.subtotal),lm+pw,ty,{align:'right'});ty+=8;
  pdf.text('VAT:',146,ty,{align:'right'});pdf.text(fmtMoney(d.vat),lm+pw,ty,{align:'right'});ty+=8;
  pdf.setFontSize(12);pdf.setFont(undefined,'bold');
  pdf.text('Total Due:',146,ty,{align:'right'});pdf.text(fmtMoney(d.total),lm+pw,ty,{align:'right'});
  pdf.setLineWidth(0.5);pdf.line(120,ty+2,lm+pw,ty+2);
  ty+=14;
  pdf.setFontSize(10);pdf.setFont(undefined,'bold');pdf.text('Payment Details',lm,ty);ty+=7;
  pdf.setFont(undefined,'normal');pdf.setFontSize(9);
  pdf.text('Bank Transfer or Cash only (cheques will NOT be accepted)',lm,ty);ty+=6;
  pdf.text('Account Name: Strike Point Lightning Protection Ltd',lm,ty);ty+=6;
  pdf.text('Account No: 21842273',lm,ty);ty+=6;
  pdf.text('Sort Code: 04-06-05',lm,ty);ty+=8;
  pdf.setFont(undefined,'italic');
  pdf.text('Payment strictly 30 days from invoice date. Late payments subject to statutory interest at 8% + BoE base rate.',lm,ty,{maxWidth:pw});
  if(d.notes){
    ty+=14;pdf.setFont(undefined,'bold');pdf.text('Notes:',lm,ty);ty+=6;
    pdf.setFont(undefined,'normal');
    pdf.splitTextToSize(d.notes,pw).forEach(function(nl){pdf.text(nl,lm,ty);ty+=5;});
  }
  addFtr(pdf);
}

function addFtr(pdf){
  pdf.setFontSize(8);pdf.setFont(undefined,'normal');
  pdf.text('Strike Point Lightning Protection Ltd  |  Company No. 15114852  |  VAT No. 448 8105 74  |  Registered in England and Wales',105,283,{align:'center'});
}

function fmtDate(ds){if(!ds)return'';var p=ds.split('-');return p.length===3?p[2]+'/'+p[1]+'/'+p[0]:ds;}
function loadImgB64(url,cb){
  var img=new Image();img.crossOrigin='anonymous';
  img.onload=function(){var c=document.createElement('canvas');c.width=img.width;c.height=img.height;c.getContext('2d').drawImage(img,0,0);cb(c.toDataURL('image/png'));};
  img.onerror=function(){cb(null);};img.src=url;
}
function fmtMoney(v){return'\u00a3'+parseFloat(v||0).toFixed(2);}
function cap(s){return s?s.charAt(0).toUpperCase()+s.slice(1):'';}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function showToast(msg,type){
  var t=document.getElementById('toast');t.textContent=msg;
  t.className='toast show '+(type||'success');
  setTimeout(function(){t.classList.remove('show');},3500);
}
