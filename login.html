<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="manifest" href="/Wiggle/manifest.json">
<meta name="theme-color" content="#f59e0b">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SP FSM">
<link rel="apple-touch-icon" href="https://raw.githubusercontent.com/SPLP-2023/tool/refs/heads/main/icons/icon-192x192.png">
<meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — Strike Point Lightning Protection Ltd</title>
<!-- Firebase compat SDK -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<style>
  :root {
    --primary:#f59e0b; --primary-dark:#d97706; --primary-light:#fef3c7;
    --dark:#0f172a; --dark2:#1e293b; --dark3:#334155;
    --text:#f1f5f9; --text-muted:#94a3b8;
    --card-bg:#1e293b; --border:#334155;
    --danger:#ef4444; --success:#22c55e;
    --radius:10px; --shadow:0 4px 24px rgba(0,0,0,0.4);
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:'Segoe UI',system-ui,sans-serif; background:var(--dark); color:var(--text); min-height:100vh; }
  #login-screen {
    min-height:100vh; display:flex; align-items:center; justify-content:center;
    background:linear-gradient(135deg,#0f172a 0%,#1e293b 50%,#0f172a 100%);
  }
  .login-card {
    background:var(--card-bg); border:1px solid var(--border); border-radius:16px;
    padding:48px 40px; width:100%; max-width:400px; box-shadow:var(--shadow);
  }
  .login-logo { text-align:center; margin-bottom:32px; }
  .login-logo h1 { font-size:20px; font-weight:700; color:var(--primary); margin-top:8px; line-height:1.2; }
  .login-logo p { font-size:12px; color:var(--text-muted); margin-top:4px; letter-spacing:1px; text-transform:uppercase; }
  .form-group { margin-bottom:20px; }
  .form-group label { display:block; font-size:13px; color:var(--text-muted); margin-bottom:8px; font-weight:500; }
  .form-group input {
    width:100%; padding:12px 16px; background:var(--dark); border:1px solid var(--border);
    border-radius:var(--radius); color:var(--text); font-size:15px; transition:border-color 0.2s;
  }
  .form-group input:focus { outline:none; border-color:var(--primary); }
  .btn-primary {
    display:inline-flex; align-items:center; justify-content:center;
    width:100%; padding:13px; border-radius:var(--radius); font-size:15px; font-weight:600;
    cursor:pointer; border:none; background:var(--primary); color:var(--dark); transition:all 0.2s;
  }
  .btn-primary:hover { background:var(--primary-dark); }
  .error-msg { color:var(--danger); font-size:13px; margin-top:12px; text-align:center; min-height:20px; }
  #_fsm_loader {
    position:fixed; inset:0; background:#0f172a; z-index:9999;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:16px;
  }
  .loader-spinner {
    width:40px; height:40px; border:3px solid #334155;
    border-top-color:#f59e0b; border-radius:50%; animation:spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform:rotate(360deg); } }
</style>
</head>
<body>

<div id="_fsm_loader">
  <img src="https://raw.githubusercontent.com/SPLP-2023/tool/refs/heads/main/assets/Color%20logo%20-%20no%20background%20(px%20reduction).png" alt="Logo" style="height:32px;width:auto;object-fit:contain;">
  <div style="font-size:16px;font-weight:600;color:#f59e0b;">Strike Point</div>
  <div class="loader-spinner"></div>
  <div style="font-size:13px;color:#94a3b8;">Connecting…</div>
</div>

<div id="login-screen" style="display:none;">
  <div class="login-card">
    <div class="login-logo">
      <img src="https://raw.githubusercontent.com/SPLP-2023/tool/refs/heads/main/icons/icon-192x192.png" alt="Strike Point Logo" style="width:120px;height:120px;object-fit:contain;margin-bottom:8px;">
      <h1>Strike Point<br>Lightning Protection Ltd</h1>
      <p>Field Service Management</p>
    </div>
    <div class="form-group">
      <label for="login-user">Username</label>
      <input type="text" id="login-user" placeholder="Enter username" autocomplete="username">
    </div>
    <div class="form-group">
      <label for="login-pass">Password</label>
      <input type="password" id="login-pass" placeholder="Enter password" autocomplete="current-password">
    </div>
    <button class="btn-primary" onclick="doLogin()">Sign In</button>
    <div class="error-msg" id="login-error"></div>
  </div>
</div>

<script src="/Wiggle/js/data.js"></script>
<script>
  const existing = getSession();
  if (existing) {
    window.location.href = '/Wiggle/index.html';
  } else {
    initFirebase().then(() => {
      document.getElementById('_fsm_loader').style.display = 'none';
      document.getElementById('login-screen').style.display = 'flex';
    }).catch(err => {
      console.error('Firebase error:', err);
      document.getElementById('_fsm_loader').style.display = 'none';
      document.getElementById('login-screen').style.display = 'flex';
      document.getElementById('login-error').textContent = 'Connection error. Please refresh.';
    });
  }

  function doLogin() {
    const u = document.getElementById('login-user').value.trim().toLowerCase();
    const p = document.getElementById('login-pass').value;
    const user = appData.users.find(x => x.username.toLowerCase() === u && x.password === p);
    if (!user) {
      document.getElementById('login-error').textContent = 'Invalid username or password.';
      return;
    }
    setSession(user);
    window.location.href = '/Wiggle/index.html';
  }

  document.getElementById('login-pass').addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });
</script>
  <script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/Wiggle/sw.js');
  }
</script>
</body>
</html>
